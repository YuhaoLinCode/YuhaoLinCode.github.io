about:
  eyebrow: About
  heading: About
  paragraphs:
    - Hi! I am Yuhao Lin (林宇浩). I am currently a Master's student at the [Intelligence Science and System Lab (iSEE Lab)](https://isee-ai.cn/), [School of Computer Science and Engineering](https://cse.sysu.edu.cn/), [Sun Yat-sen University](https://www.sysu.edu.cn/), advised by Prof. [Wei-Shi Zheng](http://www.isee-ai.cn/~zhwshi/). Prior to this, I obtained my B.S. from the same school at Sun Yat-sen University.
    - My research interests include Embodied AI and Robotics. Feel free to reach out if you are interested in collaboration or discussion.
